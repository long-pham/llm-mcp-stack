services:
  # ===========================================
  # SearXNG - Privacy-respecting metasearch engine
  # ===========================================
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    ports:
      - "${SEARXNG_PORT:-38080}:8080"
    volumes:
      - ./searxng/config:/etc/searxng:rw
      - ./searxng/data:/var/cache/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://localhost:${SEARXNG_PORT:-38080}/
      - INSTANCE_NAME=llm-search
      - SEARXNG_SECRET_KEY=${SEARXNG_SECRET_KEY:?SEARXNG_SECRET_KEY is required in .env}
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    networks:
      - mcp-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ===========================================
  # SearXNG MCP Server - Connects SearXNG to MCP
  # ===========================================
  searxng-mcp:
    image: isokoliuk/mcp-searxng:latest
    container_name: searxng-mcp
    restart: unless-stopped
    ports:
      - "${SEARXNG_MCP_PORT:-38081}:8080"
    environment:
      - SEARXNG_URL=http://searxng:8080
      - MCP_HTTP_PORT=8080
    depends_on:
      searxng:
        condition: service_healthy
    networks:
      - mcp-network

  # ===========================================
  # Crawl4AI - Web crawling and scraping MCP
  # ===========================================
  crawl4ai:
    image: unclecode/crawl4ai:latest
    container_name: crawl4ai
    restart: unless-stopped
    ports:
      - "${CRAWL4AI_PORT:-11235}:11235"
    environment:
      # API token optional - only set if you need auth
      - CRAWL4AI_API_TOKEN=${CRAWL4AI_API_TOKEN-}
      - MAX_CONCURRENT_TASKS=${CRAWL4AI_MAX_TASKS:-5}
    volumes:
      - crawl4ai-data:/app/data
    # Shared memory for Chrome - critical for rendering
    shm_size: 2g
    deploy:
      resources:
        limits:
          memory: 4g
        reservations:
          memory: 1g
    networks:
      - mcp-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11235/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ===========================================
  # MCPHub - MCP Aggregator/Gateway
  # ===========================================
  mcphub:
    image: samanhappy/mcphub:latest
    container_name: mcphub
    restart: unless-stopped
    ports:
      - "${MCPHUB_PORT:-3000}:3000"
    volumes:
      - ./mcphub/mcp_settings.json:/app/mcp_settings.json
    networks:
      - mcp-network
    depends_on:
      searxng-mcp:
        condition: service_started
      crawl4ai:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/auth/login').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

networks:
  mcp-network:
    driver: bridge

volumes:
  crawl4ai-data:
