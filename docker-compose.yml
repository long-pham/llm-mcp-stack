services:
  # ===========================================
  # SearXNG - Privacy-respecting metasearch engine
  # ===========================================
  searxng:
    image: searxng/searxng:2026.2.16-8e824017d
    container_name: searxng
    restart: unless-stopped
    volumes:
      - ./searxng/config:/etc/searxng:rw
      - ./searxng/data:/var/cache/searxng:rw
    environment:
      - SEARXNG_SECRET_KEY=${SEARXNG_SECRET_KEY:?SEARXNG_SECRET_KEY is required in .env}
      - UWSGI_WORKERS=${SEARXNG_WORKERS:-4}
      - UWSGI_THREADS=${SEARXNG_THREADS:-4}
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    networks:
      - mcp-network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:8080/" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ===========================================
  # SearXNG MCP Server - Connects SearXNG to MCP
  # ===========================================
  searxng-mcp:
    image: isokoliuk/mcp-searxng:0.8.0
    container_name: searxng-mcp
    restart: unless-stopped
    ports:
      - "${SEARXNG_MCP_PORT:-38081}:8080"
    environment:
      - SEARXNG_URL=http://searxng:8080
      - MCP_HTTP_PORT=8080
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      searxng:
        condition: service_healthy
    networks:
      - mcp-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ===========================================
  # Crawl4AI - Web crawling and scraping MCP
  # ===========================================
  crawl4ai:
    image: unclecode/crawl4ai:0.8.0
    container_name: crawl4ai
    restart: unless-stopped
    ports:
      - "${CRAWL4AI_PORT:-11235}:11235"
    environment:
      - CRAWL4AI_API_TOKEN=${CRAWL4AI_API_TOKEN-}
      - MAX_CONCURRENT_TASKS=${CRAWL4AI_MAX_TASKS:-10}
    volumes:
      - crawl4ai-data:/app/data
    shm_size: 2g
    security_opt:
      - no-new-privileges:true
    networks:
      - mcp-network
    deploy:
      resources:
        limits:
          memory: 6g
        reservations:
          memory: 2g
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:11235/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ===========================================
  # Paper Search - Multi-source academic paper search MCP
  # ===========================================
  paper-search:
    build:
      context: ./paper-search
    container_name: paper-search
    restart: unless-stopped
    ports:
      - "${PAPER_SEARCH_PORT:-38082}:8000"
    environment:
      - ACADEMIC_MCP_DOWNLOAD_PATH=/data/papers
      - ACADEMIC_MCP_ENABLED_SOURCES=${PAPER_SEARCH_SOURCES:-}
      - ACADEMIC_MCP_DISABLED_SOURCES=${PAPER_SEARCH_DISABLED:-}
    volumes:
      - paper-search-data:/data/papers
    security_opt:
      - no-new-privileges:true
    networks:
      - mcp-network
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    healthcheck:
      test: [ "CMD-SHELL", "curl -m 5 -sf http://localhost:8000/sse >/dev/null 2>&1 || [ $$? -eq 28 ] || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ===========================================
  # MCPHub - MCP Aggregator/Gateway
  # ===========================================
  mcphub:
    image: samanhappy/mcphub:0.12.3
    container_name: mcphub
    restart: unless-stopped
    ports:
      - "${MCPHUB_PORT:-33000}:3000"
    volumes:
      - ./mcphub/mcp_settings.json:/app/mcp_settings.json
    security_opt:
      - no-new-privileges:true
    networks:
      - mcp-network
    depends_on:
      searxng-mcp:
        condition: service_healthy
      crawl4ai:
        condition: service_healthy
      paper-search:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: [ "CMD", "node", "-e", "fetch('http://localhost:3000/api/auth/login').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

networks:
  mcp-network:
    driver: bridge

volumes:
  crawl4ai-data:
  paper-search-data:
