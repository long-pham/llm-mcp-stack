# SearXNG settings for LLM MCP integration
# See https://docs.searxng.org/admin/settings/settings.html

use_default_settings: true

general:
  instance_name: "LLM Search"
  debug: false
  enable_metrics: true

search:
  # Safe search disabled for unrestricted LLM queries
  # Set to 1 (moderate) or 2 (strict) if content filtering is needed
  safe_search: 0
  autocomplete: "duckduckgo"
  default_lang: "en"
  formats:
    - html
    - json

server:
  # Bind to all interfaces for Docker networking
  # WARNING: Ensure firewall blocks external access to port 38080
  bind_address: "0.0.0.0"
  port: 8080
  # Secret key loaded from environment variable (set SEARXNG_SECRET_KEY in .env)
  secret_key: "${SEARXNG_SECRET_KEY}"
  # Rate limiting disabled for LLM usage
  # WARNING: Do NOT expose this instance to the public internet without enabling rate limiting
  limiter: false
  public_instance: false

ui:
  static_use_hash: true
  default_theme: simple
  results_on_new_tab: false

# Enable JSON API for MCP servers
outgoing:
  request_timeout: 10.0
  max_request_timeout: 30.0
  useragent_suffix: ""
  pool_connections: 100
  pool_maxsize: 20

# Enabled search engines
engines:
  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    disabled: false

  - name: google
    engine: google
    shortcut: g
    disabled: false

  - name: bing
    engine: bing
    shortcut: bi
    disabled: false

  - name: wikipedia
    engine: wikipedia
    shortcut: wp
    disabled: false

  - name: github
    engine: github
    shortcut: gh
    disabled: false

  - name: stackoverflow
    engine: stackoverflow
    shortcut: st
    disabled: false

  - name: arxiv
    engine: arxiv
    shortcut: arx
    disabled: false
