# SearXNG settings for LLM MCP integration
# See https://docs.searxng.org/admin/settings/settings.html

use_default_settings: true

general:
  instance_name: "LLM Search"
  debug: false
  enable_metrics: true

search:
  safe_search: 0
  autocomplete: "duckduckgo"
  default_lang: "en"
  formats:
    - html
    - json

server:
  # Bind to all interfaces for Docker
  bind_address: "0.0.0.0"
  port: 8080
  secret_key: "fe3b070c38906c1a072fd76cefdb8aea194c89885bb35ec21b54dbfdb2f9f18d"
  limiter: false  # Disable rate limiting for LLM usage
  public_instance: false

ui:
  static_use_hash: true
  default_theme: simple
  results_on_new_tab: false

# Enable JSON API for MCP servers
outgoing:
  request_timeout: 10.0
  max_request_timeout: 30.0
  useragent_suffix: ""
  pool_connections: 100
  pool_maxsize: 20

# Enabled search engines
engines:
  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    disabled: false

  - name: google
    engine: google
    shortcut: g
    disabled: false

  - name: bing
    engine: bing
    shortcut: bi
    disabled: false

  - name: wikipedia
    engine: wikipedia
    shortcut: wp
    disabled: false

  - name: github
    engine: github
    shortcut: gh
    disabled: false

  - name: stackoverflow
    engine: stackoverflow
    shortcut: st
    disabled: false

  - name: arxiv
    engine: arxiv
    shortcut: arx
    disabled: false
